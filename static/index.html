<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0">
 <title>Local RAG Assistant</title>
 <script src="https://cdn.tailwindcss.com"></script>
 <link rel="stylesheet" href="/static/styles.css">
</head>
<body class="h-full bg-gray-50 flex flex-col">
 <header class="bg-white border-b border-gray-200 px-4 py-3 flex items-center justify-between shrink-0">
 <div class="flex items-center gap-2">
 <svg class="w-6 h-6 text-blue-600"fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
 <h1 class="text-lg font-semibold text-gray-800">Local RAG Assistant</h1>
 </div>
 <div class="flex items-center gap-2">
 <button id="dark-toggle" class="p-2 rounded-lg text-gray-500 hover:text-gray-700 hover:bg-gray-100" title="Toggle dark mode">
 <svg id="sun-icon" class="w-5 h-5"fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/></svg>
 <svg id="moon-icon" class="w-5 h-5"fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21.752 15.002A9.718 9.718 0 0118 15.75c-5.385 0-9.75-4.365-9.75-9.75 0-1.33.266-2.597.748-3.752A9.753 9.753 0 003 11.25C3 16.635 7.365 21 12.75 21a9.753 9.753 0 009.002-5.998z"/></svg>
 </button>
 <nav class="flex gap-1 bg-gray-100 rounded-lg p-1">
 <button id="tab-chat-btn" class="tab-btn active px-4 py-1.5 text-sm font-medium rounded-md" data-tab="chat">Chat</button>
 <button id="tab-settings-btn" class="tab-btn px-4 py-1.5 text-sm font-medium rounded-md" data-tab="settings">Settings</button>
 </nav>
 </div>
 </header>

 <!-- ===== CHAT TAB ===== -->
 <main id="tab-chat" class="tab-content flex-1 flex flex-col min-h-0">
 <div id="no-model-banner" class="hidden bg-amber-50 border-b border-amber-200 px-4 py-3 text-sm text-amber-800 flex items-center gap-2 shrink-0">
 <svg class="w-5 h-5 shrink-0" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 9v3.75m9-.75a9 9 0 11-18 0 9 9 0 0118 0zm-9 3.75h.008v.008H12v-.008z"/></svg>
 <span>No chat model loaded. Go to <button onclick="switchTab('settings')" class="font-medium underline hover:text-amber-900">Settings</button> to download one.</span>
 </div>
 <div id="messages" class="flex-1 overflow-y-auto px-4 py-4 space-y-4"></div>
 <form id="chat-form" class="border-t border-gray-200 bg-white px-4 py-3 flex gap-2 items-end shrink-0">
 <div class="flex-1 relative">
 <textarea id="chat-input" rows="2" placeholder="Ask a question about your documents..." class="w-full resize-none rounded-xl border border-gray-300 bg-white text-gray-900 px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent pr-12 placeholder-gray-400"></textarea>
 <div class="absolute bottom-2 right-2 flex items-center gap-1">
 <button id="web-search-toggle" type="button" class="p-1.5 rounded-lg text-gray-400 hover:text-blue-600 hover:bg-blue-50 transition-colors" title="Toggle web search">
 <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z"/><path d="M12 6v6l4 2"/></svg>
 </button>
 <button id="send-btn" type="submit" class="bg-blue-600 text-white rounded-lg p-1.5 hover:bg-blue-700 disabled:opacity-40 disabled:cursor-not-allowed transition-colors">
 <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M22 2L11 13"/><path d="M22 2L15 22l-4-9-9-4 20-7z"/></svg>
 </button>
 </div>
 </div>
 </form>
 </main>

 <!-- ===== SETTINGS TAB ===== -->
 <main id="tab-settings" class="tab-content flex-1 hidden flex-col min-h-0 overflow-y-auto">
 <div class="p-6 max-w-3xl mx-auto w-full space-y-8">

 <!-- ── Model Management ── -->
 <section>
 <h2 class="text-lg font-semibold text-gray-800 mb-4">Model Management</h2>
 <p class="text-sm text-gray-500 mb-4">Select which chat model to use. Models are downloaded from Hugging Face and stored locally.</p>

 <div id="model-list" class="space-y-3"></div>

 <div id="dl-progress-area" class="hidden mt-4 p-4 bg-gray-50 rounded-xl border border-gray-200">
 <div class="flex items-center justify-between text-sm text-gray-600 mb-1.5">
 <span id="dl-progress-message">Starting...</span>
 <span id="dl-progress-pct">0%</span>
 </div>
 <div class="w-full bg-gray-200 rounded-full h-3 overflow-hidden">
 <div id="dl-progress-bar" class="bg-blue-600 h-3 rounded-full transition-all duration-300" style="width:0%"></div>
 </div>
 </div>
 </section>

 <hr class="border-gray-200">

 <!-- ── Document Management ── -->
 <section>
 <h2 class="text-lg font-semibold text-gray-800 mb-4">Document Management</h2>

 <div id="drop-zone" class="drop-zone border-2 border-dashed border-gray-300 rounded-xl p-8 text-center cursor-pointer hover:border-blue-400 transition-colors">
 <svg class="w-10 h-10 mx-auto text-gray-400 mb-3" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M12 16V4m0 0L8 8m4-4l4 4"/><path d="M4 16v2a2 2 0 002 2h12a2 2 0 002-2v-2"/></svg>
 <p class="text-sm text-gray-500">Drop PDF or text files here, or <span class="text-blue-600 font-medium">browse</span></p>
 <p class="text-xs text-gray-400 mt-1">Multiple files accepted</p>
 <input id="file-input" type="file" multiple accept=".pdf,.txt" class="hidden">
 </div>

 <div id="file-list" class="mt-4 space-y-1.5"></div>

 <div id="ingestion-controls" class="mt-4 flex gap-2">
 <button id="ingest-btn" class="px-5 py-2 bg-blue-600 text-white text-sm font-medium rounded-lg hover:bg-blue-700 disabled:opacity-40 disabled:cursor-not-allowed">Process &amp; Ingest</button>
 <button id="clear-btn" class="px-5 py-2 bg-gray-200 text-gray-700 text-sm font-medium rounded-lg hover:bg-gray-300">Clear Uploads</button>
 </div>

 <div id="progress-area" class="mt-4 hidden">
 <div class="flex items-center justify-between text-sm text-gray-600 mb-1.5">
 <span id="progress-message">Processing...</span>
 <span id="progress-percent">0%</span>
 </div>
 <div class="w-full bg-gray-200 rounded-full h-3 overflow-hidden">
 <div id="progress-bar" class="bg-blue-600 h-3 rounded-full transition-all duration-300" style="width:0%"></div>
 </div>
 </div>
 </section>

 </div>
 </main>

 <script src="/static/app.js"></script>
</body>
</html>
